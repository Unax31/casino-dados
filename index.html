<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino de Dados</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--bg4:#262633;
  --border:#2e2e3e;--border2:#3d3d52;
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;
  --green:#2ecc71;--green-bg:#0d2e1a;--green-text:#4eff97;
  --red:#e74c3c;--red-bg:#2e0d0d;--red-text:#ff6b6b;
  --yellow:#f1c40f;--yellow-bg:#2e280d;--yellow-text:#ffe066;
  --blue:#3b82f6;--blue-bg:#0d1a2e;--blue-text:#7eb8ff;
  --purple:#8b5cf6;--radius:8px;--radius2:12px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-size:22px;font-weight:700;color:var(--yellow);letter-spacing:-0.5px}
.logo span{color:var(--text2);font-weight:400;font-size:14px;margin-left:6px}
.header-stats{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap}
.hstat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:6px 14px;font-size:13px}
.hstat label{color:var(--text3);font-size:11px;display:block;margin-bottom:2px}
.hstat .val{font-weight:600;color:var(--text)}
.hstat .val.green{color:var(--green-text)}
.hstat .val.red{color:var(--red-text)}
.hstat .val.yellow{color:var(--yellow-text)}

/* CONFIG ROW */
.config-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.config-bar label{font-size:12px;color:var(--text3)}
select,input[type=number]{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius);padding:5px 10px;font-size:13px;outline:none}
select:focus,input:focus{border-color:var(--blue)}
.sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.reset-btn{margin-left:auto;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);border-radius:var(--radius);padding:5px 14px;font-size:12px;cursor:pointer;transition:all .15s}
.reset-btn:hover{border-color:var(--red);color:var(--red-text)}

/* MAIN */
main{display:grid;grid-template-columns:220px 1fr 320px;flex:1;overflow:hidden}

/* LEFT SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto}
.sidebar-title{padding:12px 14px 8px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border)}
.cat-item{padding:9px 14px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;transition:all .1s;user-select:none}
.cat-item:hover{background:var(--bg3);color:var(--text)}
.cat-item.active{background:var(--blue-bg);color:var(--blue-text);border-left:3px solid var(--blue)}
.cat-count{font-size:11px;background:var(--bg4);border-radius:10px;padding:1px 7px;color:var(--text3)}
.cat-item.active .cat-count{background:rgba(59,130,246,.2);color:var(--blue-text)}

/* CENTER: BETS TABLE */
.bets-area{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.bets-header{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg2);font-size:13px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:8px}
.bets-scroll{overflow-y:auto;flex:1}
table{width:100%;border-collapse:collapse}
th{position:sticky;top:0;background:var(--bg3);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:9px 14px;text-align:left;border-bottom:1px solid var(--border);z-index:1}
th.r{text-align:right}
td{padding:8px 14px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text)}
td.r{text-align:right}
tr:hover td{background:var(--bg3);cursor:pointer}
tr.sel td{background:var(--blue-bg)}
.odds-pill{display:inline-block;background:var(--green-bg);color:var(--green-text);font-size:12px;font-weight:600;border-radius:6px;padding:2px 8px}
.prob-text{color:var(--text3);font-size:12px}

/* RIGHT PANEL */
.right-panel{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

/* BET BUILDER */
.builder{padding:14px;border-bottom:1px solid var(--border)}
.section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.amount-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.amount-row label{font-size:12px;color:var(--text3);white-space:nowrap}
.amount-row input{flex:1;min-width:0}
.quick-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.qbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);border-radius:var(--radius);padding:3px 10px;font-size:12px;cursor:pointer;transition:all .1s}
.qbtn:hover{background:var(--bg4);color:var(--text)}
.queue-list{min-height:40px;margin-bottom:10px}
.empty-q{font-size:12px;color:var(--text3);padding:8px 0}
.q-item{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;margin-bottom:5px;font-size:12px}
.q-name{flex:1;color:var(--text)}
.q-odds{color:var(--green-text);font-weight:600}
.q-amt{color:var(--text2)}
.q-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;margin-left:auto}
.q-remove:hover{color:var(--red-text)}
.roll-btn{width:100%;padding:11px;font-size:15px;font-weight:700;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;transition:all .15s;letter-spacing:.3px}
.roll-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.roll-btn:active{transform:translateY(0)}
.roll-btn:disabled{background:var(--bg3);color:var(--text3);cursor:default;transform:none;filter:none}

/* DICE DISPLAY */
.dice-area{padding:12px 14px;border-bottom:1px solid var(--border)}
.dice-row{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.die{width:42px;height:42px;border:1px solid var(--border2);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--bg3);transition:transform .2s}
.die.bounce{animation:bounce .35s ease-out}
@keyframes bounce{0%{transform:scale(1.2) rotate(-5deg)}50%{transform:scale(.9) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
.sum-label{text-align:center;font-size:13px;color:var(--text2)}
.sum-label span{color:var(--yellow-text);font-weight:700;font-size:16px}

/* RESULT LIST */
.results-list{padding:8px 14px;border-bottom:1px solid var(--border)}
.r-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.r-item:last-child{border-bottom:none}
.r-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;flex-shrink:0}
.r-badge.won{background:var(--green-bg);color:var(--green-text)}
.r-badge.lost{background:var(--red-bg);color:var(--red-text)}
.r-name{flex:1;color:var(--text2)}
.r-pay{font-weight:600}
.r-pay.pos{color:var(--green-text)}
.r-pay.neg{color:var(--red-text)}
.net-row{padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;justify-content:space-between}
.net-row span.pos{color:var(--green-text)}
.net-row span.neg{color:var(--red-text)}

/* HISTORY */
.history-area{flex:1;overflow:hidden;display:flex;flex-direction:column}
.hist-header{padding:10px 14px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--border)}
.hist-scroll{overflow-y:auto;flex:1}
.hist-row{display:flex;align-items:center;gap:6px;padding:7px 14px;border-bottom:1px solid var(--border);font-size:11px}
.hist-dice{font-family:monospace;color:var(--text);font-size:12px}
.hist-bets{flex:1;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin:0 6px}
.hist-net{font-weight:600;flex-shrink:0}
.hist-net.pos{color:var(--green-text)}
.hist-net.neg{color:var(--red-text)}

/* SCROLLBARS */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* RESPONSIVE */
@media(max-width:900px){main{grid-template-columns:1fr}
.sidebar,.right-panel{display:none}.sidebar.open,.right-panel.open{display:block}}
</style>
</head>
<body>

<header>
  <div class="logo">🎲 Casino de Dados <span>v2.0</span></div>
  <div class="header-stats">
    <div class="hstat"><label>Saldo</label><div class="val yellow" id="h-balance">€1.000</div></div>
    <div class="hstat"><label>Tiradas</label><div class="val" id="h-rolls">0</div></div>
    <div class="hstat"><label>Ganado</label><div class="val green" id="h-won">€0</div></div>
    <div class="hstat"><label>Perdido</label><div class="val red" id="h-lost">€0</div></div>
    <div class="hstat"><label>ROI</label><div class="val" id="h-roi">—</div></div>
  </div>
</header>

<div class="config-bar">
  <label>Dados:</label>
  <select id="sel-dice" onchange="changeConfig()">
    <option value="5" selected>5 dados</option>
    <option value="6">6 dados</option>
    <option value="7">7 dados</option>
  </select>
  <div class="sep"></div>
  <label>House edge:</label>
  <select id="sel-edge" onchange="changeConfig()">
    <option value="02">2%</option>
    <option value="03">3%</option>
    <option value="05" selected>5%</option>
    <option value="10">10%</option>
  </select>
  <div class="sep"></div>
  <label>Saldo inicial:</label>
  <input type="number" id="inp-balance" value="1000" min="10" max="1000000" step="10" style="width:100px">
  <button class="reset-btn" onclick="resetGame()">↺ Reiniciar</button>
</div>

<main>
  <!-- LEFT: categories -->
  <div class="sidebar">
    <div class="sidebar-title">Categorías</div>
    <div id="cat-list"></div>
  </div>

  <!-- CENTER: bets table -->
  <div class="bets-area">
    <div class="bets-header" id="bets-header">Selecciona una categoría</div>
    <div class="bets-scroll">
      <table>
        <thead>
          <tr>
            <th>Apuesta</th>
            <th class="r">Prob%</th>
            <th class="r">Cuota</th>
          </tr>
        </thead>
        <tbody id="bets-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- RIGHT: builder + results + history -->
  <div class="right-panel">
    <div class="builder">
      <div class="section-label">Importe por apuesta</div>
      <div class="amount-row">
        <label>€</label>
        <input type="number" id="inp-amt" value="10" min="1" step="1">
      </div>
      <div class="quick-row">
        <button class="qbtn" onclick="setAmt(1)">1</button>
        <button class="qbtn" onclick="setAmt(5)">5</button>
        <button class="qbtn" onclick="setAmt(10)">10</button>
        <button class="qbtn" onclick="setAmt(25)">25</button>
        <button class="qbtn" onclick="setAmt(50)">50</button>
        <button class="qbtn" onclick="setAmt(100)">100</button>
      </div>
      <div class="section-label">Cola de apuestas</div>
      <div class="queue-list" id="queue-list">
        <div class="empty-q">Haz clic en una apuesta para añadirla</div>
      </div>
      <button class="roll-btn" id="roll-btn" onclick="roll()" disabled>🎲 TIRAR DADOS</button>
    </div>

    <div class="dice-area" id="dice-area" style="display:none">
      <div class="dice-row" id="dice-row"></div>
      <div class="sum-label">Suma: <span id="sum-val">—</span></div>
    </div>

    <div id="results-area" style="display:none">
      <div class="results-list" id="results-list"></div>
      <div class="net-row">Neto: <span id="net-val"></span></div>
    </div>

    <div class="history-area">
      <div class="hist-header">Historial</div>
      <div class="hist-scroll" id="hist-scroll">
        <div style="padding:12px 14px;font-size:12px;color:var(--text3)">Aún no hay tiradas.</div>
      </div>
    </div>
  </div>
</main>

_05": 2.8, "odds_10": 2.7}, {"id": "at_least_3_of_6", "name": "Al menos 3 dados con 6", "prob": 0.09577546, "odds_02": 10.0, "odds_03": 10.0, "odds_05": 9.0, "odds_10": 9.0}, {"id": "at_least_4_of_6", "name": "Al menos 4 dados con 6", "prob": 0.0176326, "odds_02": 55.0, "odds_03": 55.0, "odds_05": 53.0, "odds_10": 51.0}], "Patrones": [{"id": "exactly_1_distinct", "name": "Exactamente 1 valores distintos", "prob": 2.143e-05, "odds_02": 45722.0, "odds_03": 45256.0, "odds_05": 44323.0, "odds_10": 41990.0}, {"id": "exactly_2_distinct", "name": "Exactamente 2 valores distintos", "prob": 0.00675154, "odds_02": 145.0, "odds_03": 143.0, "odds_05": 140.0, "odds_10": 133.0}, {"id": "exactly_3_distinct", "name": "Exactamente 3 valores distintos", "prob": 0.12902949, "odds_02": 7.0, "odds_03": 7.0, "odds_05": 7.0, "odds_10": 6.0}, {"id": "exactly_4_distinct", "name": "Exactamente 4 valores distintos", "prob": 0.45010288, "odds_02": 2.1, "odds_03": 2.1, "odds_05": 2.1, "odds_10": 1.9}, {"id": "exactly_5_distinct", "name": "Exactamente 5 valores distintos", "prob": 0.3600823, "odds_02": 2.7, "odds_03": 2.6, "odds_05": 2.6, "odds_10": 2.4}, {"id": "exactly_6_distinct", "name": "Exactamente 6 valores distintos", "prob": 0.05401235, "odds_02": 18.0, "odds_03": 17.0, "odds_05": 17.0, "odds_10": 16.0}]}};

const FACES = ["","⚀","⚁","⚂","⚃","⚄","⚅"];

let S = {
  balance: 1000, wagered: 0, won: 0, lost: 0, rolls: 0,
  queue: [], history: [],
  nDice: '5', edge: '05', cat: null
};

function getEdgeKey(){ return 'odds_'+S.edge; }
function getBets(){ return BETS_DATA[S.nDice] || {}; }
function getCats(){ return Object.keys(getBets()); }

function renderCats(){
  const cats = getCats();
  document.getElementById('cat-list').innerHTML = cats.map(c => {
    const n = (getBets()[c]||[]).length;
    const active = S.cat===c ? 'active' : '';
    return `<div class="cat-item ${active}" onclick="selectCat('${c}')">${c}<span class="cat-count">${n}</span></div>`;
  }).join('');
}

function selectCat(cat){
  S.cat = cat;
  renderCats();
  document.getElementById('bets-header').textContent = cat;
  const bets = getBets()[cat] || [];
  const ekey = getEdgeKey();
  document.getElementById('bets-tbody').innerHTML = bets.map(b => {
    const odds = b[ekey];
    const oddsStr = odds >= 10 ? Math.round(odds)+'x' : odds+'x';
    const pct = (b.prob*100).toFixed(b.prob < 0.001 ? 4 : b.prob < 0.01 ? 3 : 2);
    return `<tr onclick="addBet('${b.id}')">
      <td>${b.name}</td>
      <td class="r prob-text">${pct}%</td>
      <td class="r"><span class="odds-pill">${oddsStr}</span></td>
    </tr>`;
  }).join('');
}

function findBet(id){
  for(const [cat, bets] of Object.entries(getBets())){
    const b = bets.find(x=>x.id===id);
    if(b) return b;
  }
  return null;
}

function addBet(id){
  const b = findBet(id);
  if(!b) return;
  const amt = parseFloat(document.getElementById('inp-amt').value)||10;
  if(amt > S.balance){ alert('Saldo insuficiente'); return; }
  S.queue.push({...b, amount: amt, ekey: getEdgeKey()});
  renderQueue();
  document.getElementById('roll-btn').disabled = false;
  document.getElementById('dice-area').style.display = 'none';
  document.getElementById('results-area').style.display = 'none';
}

function removeQ(idx){
  S.queue.splice(idx,1);
  renderQueue();
  if(!S.queue.length) document.getElementById('roll-btn').disabled = true;
}

function renderQueue(){
  const el = document.getElementById('queue-list');
  if(!S.queue.length){
    el.innerHTML = '<div class="empty-q">Haz clic en una apuesta para añadirla</div>';
    return;
  }
  el.innerHTML = S.queue.map((b,i) => {
    const ekey = b.ekey || getEdgeKey();
    const odds = b[ekey];
    const oddsStr = odds >= 10 ? Math.round(odds)+'x' : odds+'x';
    return `<div class="q-item">
      <span class="q-name">${b.name}</span>
      <span class="q-odds">${oddsStr}</span>
      <span class="q-amt">€${b.amount}</span>
      <button class="q-remove" onclick="removeQ(${i})">×</button>
    </div>`;
  }).join('');
}

function roll(){
  if(!S.queue.length) return;
  const n = parseInt(S.nDice);
  const dice = Array.from({length:n}, ()=>Math.ceil(Math.random()*6));
  const total = dice.reduce((a,b)=>a+b,0);

  // animate dice
  document.getElementById('dice-area').style.display = 'block';
  const dr = document.getElementById('dice-row');
  dr.innerHTML = dice.map(d=>`<div class="die bounce">${FACES[d]}</div>`).join('');
  document.getElementById('sum-val').textContent = total;

  const results = S.queue.map(b => {
    const ekey = b.ekey || getEdgeKey();
    const odds = b[ekey];
    const won = evalBet(b.id, dice, total, n);
    const payout = won ? parseFloat((b.amount*(odds-1)).toFixed(2)) : -b.amount;
    return {...b, won, payout, odds};
  });

  const net = parseFloat(results.reduce((s,r)=>s+r.payout,0).toFixed(2));
  const wagered = S.queue.reduce((s,b)=>s+b.amount,0);

  S.balance = parseFloat((S.balance+net).toFixed(2));
  S.wagered += wagered;
  results.forEach(r=>{ if(r.payout>0) S.won+=r.payout; else S.lost+=Math.abs(r.payout); });
  S.rolls++;

  S.history.unshift({dice, total, results, net, balance:S.balance});
  if(S.history.length>100) S.history.pop();

  // show results
  document.getElementById('results-area').style.display = 'block';
  document.getElementById('results-list').innerHTML = results.map(r=>`
    <div class="r-item">
      <span class="r-badge ${r.won?'won':'lost'}">${r.won?'✓ GANÓ':'✗ PERDIÓ'}</span>
      <span class="r-name">${r.name}</span>
      <span class="r-pay ${r.payout>=0?'pos':'neg'}">${r.payout>=0?'+':''}€${r.payout.toFixed(2)}</span>
    </div>`).join('');
  const netEl = document.getElementById('net-val');
  netEl.textContent = (net>=0?'+':'')+'€'+net.toFixed(2);
  netEl.className = net>=0 ? 'pos' : 'neg';

  S.queue = [];
  renderQueue();
  document.getElementById('roll-btn').disabled = true;
  updateStats();
  renderHistory();
}

function evalBet(id, dice, total, n){
  const vals = new Set(dice);
  const counts={};
  dice.forEach(d=>counts[d]=(counts[d]||0)+1);
  const sig = Object.values(counts).sort((a,b)=>b-a);

  if(id==='sum_even') return total%2===0;
  if(id==='sum_odd') return total%2!==0;
  if(id.startsWith('sum_exact_')) return total===parseInt(id.split('_')[2]);
  if(id.startsWith('sum_gt_')) return total>parseInt(id.split('_')[2]);
  if(id.startsWith('sum_lt_')) return total<parseInt(id.split('_')[2]);
  if(id.startsWith('sum_between_')){const p=id.split('_');return total>=parseInt(p[2])&&total<=parseInt(p[3]);}
  if(id.startsWith('sum_mult_')) return total%parseInt(id.split('_')[2])===0;
  if(id==='sum_prime') return isPrime(total);
  if(id==='sum_square'){const r=Math.round(Math.sqrt(total));return r*r===total;}
  if(id==='sum_power2') return total>0&&(total&(total-1))===0;
  if(id==='more_distinct'){
    const uniq=Object.values(counts).filter(v=>v===1).length;
    const rep=Object.values(counts).filter(v=>v>1).reduce((s,v)=>s+v,0);
    return uniq>rep;
  }
  if(id==='at_least_pair') return sig[0]>=2;
  if(id==='exactly_one_pair') return sig[0]===2&&sig.filter(x=>x===2).length===1;
  if(id==='two_pairs') return sig.filter(x=>x===2).length===2&&sig[0]===2;
  if(id==='three_pairs') return sig.filter(x=>x===2).length===3;
  if(id==='three_of_kind') return sig[0]===3&&!sig.includes(2);
  if(id==='full_house') return sig.includes(3)&&sig.includes(2);
  if(id==='four_of_kind') return sig[0]===4&&!sig.includes(3)&&!sig.includes(2);
  if(id==='five_of_kind') return sig[0]===5;
  if(id==='six_of_kind') return sig[0]===6;
  if(id==='seven_of_kind') return sig[0]===7;
  if(id==='all_same') return vals.size===1;
  if(id==='short_straight') return [1,2,3].some(i=>[i,i+1,i+2,i+3].every(v=>vals.has(v)));
  if(id==='long_straight') return [1,2].some(i=>[i,i+1,i+2,i+3,i+4].every(v=>vals.has(v)));
  if(id==='full_straight') return [1,2,3,4,5,6].every(v=>vals.has(v));
  if(id==='seq_123') return [1,2,3].every(v=>vals.has(v));
  if(id==='seq_234') return [2,3,4].every(v=>vals.has(v));
  if(id==='seq_345') return [3,4,5].every(v=>vals.has(v));
  if(id==='seq_456') return [4,5,6].every(v=>vals.has(v));
  if(id==='all_different') return vals.size===n;
  if(id==='all_high') return dice.every(d=>d>=4);
  if(id==='all_low') return dice.every(d=>d<=3);
  if(id==='majority_high'){const h=dice.filter(d=>d>=4).length;return h>n-h;}
  if(id==='majority_low'){const l=dice.filter(d=>d<=3).length;return l>n-l;}
  if(id==='more_even'){const e=dice.filter(d=>d%2===0).length;return e>n-e;}
  if(id==='more_odd'){const o=dice.filter(d=>d%2!==0).length;return o>n-o;}
  if(id==='more_high'){const h=dice.filter(d=>d>=4).length;return h>n-h;}
  if(id==='more_low'){const l=dice.filter(d=>d<=3).length;return l>n-l;}
  if(id==='all_even') return dice.every(d=>d%2===0);
  if(id==='all_odd') return dice.every(d=>d%2!==0);
  if(id==='no_ones') return !vals.has(1);
  if(id==='no_sixes') return !vals.has(6);
  if(id==='run_any'||id==='run_length_2') return longestRun(vals)>=2;
  if(id.startsWith('run_length_')) return longestRun(vals)>=parseInt(id.split('_')[2]);
  if(id.startsWith('at_least_one_')) return vals.has(parseInt(id.split('_')[3]));
  if(id.startsWith('exactly_')&&id.includes('_of_')&&!id.includes('distinct')&&!id.includes('even')&&!id.includes('odd')){
    const p=id.split('_');
    if(p[2]==='of'){const k=parseInt(p[1]),v=parseInt(p[3]);return (counts[v]||0)===k;}
  }
  if(id.startsWith('at_least_')&&id.includes('_of_')){
    const p=id.split('_');
    if(p[2]==='of'){const k=parseInt(p[1]),v=parseInt(p[3]);return (counts[v]||0)>=k;}
  }
  if(id.startsWith('exactly_')&&id.includes('_distinct')){
    return vals.size===parseInt(id.split('_')[1]);
  }
  if(id.startsWith('exactly_')&&id.includes('_even')){
    const k=parseInt(id.split('_')[1]);
    return dice.filter(d=>d%2===0).length===k;
  }
  if(id.startsWith('exactly_')&&id.includes('_odd')){
    const k=parseInt(id.split('_')[1]);
    return dice.filter(d=>d%2!==0).length===k;
  }
  if(id.startsWith('max_gte_')) return Math.max(...dice)>=parseInt(id.split('_')[2]);
  if(id.startsWith('min_lte_')) return Math.min(...dice)<=parseInt(id.split('_')[2]);
  if(id==='rng_exact_1') return Math.max(...dice)-Math.min(...dice)===1;
  if(id==='rng_exact_5') return Math.max(...dice)-Math.min(...dice)===5;
  if(id.startsWith('range_')) return Math.max(...dice)-Math.min(...dice)===parseInt(id.split('_')[1]);
  return false;
}

function longestRun(vals){
  const sv=Array.from(vals).sort((a,b)=>a-b);
  if(!sv.length) return 0;
  let best=1,cur=1;
  for(let i=1;i<sv.length;i++){if(sv[i]===sv[i-1]+1){cur++;best=Math.max(best,cur);}else cur=1;}
  return best;
}

function isPrime(n){
  if(n<2) return false; if(n===2) return true; if(n%2===0) return false;
  for(let i=3;i<=Math.sqrt(n);i+=2) if(n%i===0) return false;
  return true;
}

function fmt(v){ return '€'+v.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:2}); }

function updateStats(){
  document.getElementById('h-balance').textContent = fmt(S.balance);
  document.getElementById('h-balance').className = 'val '+(S.balance>=1000?'yellow':S.balance>=100?'yellow':'red');
  document.getElementById('h-rolls').textContent = S.rolls;
  document.getElementById('h-won').textContent = fmt(S.won);
  document.getElementById('h-lost').textContent = fmt(S.lost);
  const roiEl = document.getElementById('h-roi');
  if(S.wagered>0){
    const roi = (S.won-S.lost)/S.wagered*100;
    roiEl.textContent = (roi>=0?'+':'')+roi.toFixed(1)+'%';
    roiEl.className = 'val '+(roi>=0?'green':'red');
  }
}

function renderHistory(){
  const el = document.getElementById('hist-scroll');
  if(!S.history.length){
    el.innerHTML = '<div style="padding:12px 14px;font-size:12px;color:var(--text3)">Aún no hay tiradas.</div>';
    return;
  }
  el.innerHTML = S.history.slice(0,50).map(h=>{
    const dstr = h.dice.join('-');
    const bnames = h.results.map(r=>(r.won?'✓':'✗')+' '+r.name).join(', ');
    return `<div class="hist-row">
      <span class="hist-dice">[${dstr}] Σ${h.total}</span>
      <span class="hist-bets">${bnames}</span>
      <span class="hist-net ${h.net>=0?'pos':'neg'}">${h.net>=0?'+':''}€${h.net.toFixed(2)}</span>
    </div>`;
  }).join('');
}

function setAmt(v){ document.getElementById('inp-amt').value=v; }

function changeConfig(){
  S.nDice = document.getElementById('sel-dice').value;
  S.edge = document.getElementById('sel-edge').value;
  S.cat = null;
  S.queue = [];
  renderCats();
  renderQueue();
  document.getElementById('bets-tbody').innerHTML='';
  document.getElementById('bets-header').textContent='Selecciona una categoría';
  document.getElementById('roll-btn').disabled=true;
  document.getElementById('dice-area').style.display='none';
  document.getElementById('results-area').style.display='none';
}

function resetGame(){
  S.balance = parseFloat(document.getElementById('inp-balance').value)||1000;
  S.wagered=0; S.won=0; S.lost=0; S.rolls=0;
  S.queue=[]; S.history=[]; S.cat=null;
  S.nDice=document.getElementById('sel-dice').value;
  S.edge=document.getElementById('sel-edge').value;
  renderCats(); renderQueue(); updateStats(); renderHistory();
  document.getElementById('bets-tbody').innerHTML='';
  document.getElementById('bets-header').textContent='Selecciona una categoría';
  document.getElementById('roll-btn').disabled=true;
  document.getElementById('dice-area').style.display='none';
  document.getElementById('results-area').style.display='none';
}

renderCats();
updateStats();
renderHistory();
</script>
